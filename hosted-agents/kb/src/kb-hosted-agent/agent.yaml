# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: kb-hosted-agent
description: |
    An Agent Framework agent with local tools hosted by Foundry.
metadata:
    tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Streaming
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini
    - name: AZURE_SEARCH_ENDPOINT
      value: https://insrag-search-2b6rzj52ryljs.search.windows.net
    - name: AZURE_SEARCH_INDEX
      value: insurance-kb
    - name: AZURE_SEARCH_SEMANTIC_CONFIG
      value: insurance-kb-semantic
    - name: AZURE_SEARCH_VECTOR_FIELD
      value: contentVector
    # Resolved at container start from the Foundry project connection
    # `kb-search-key` (CustomKeys). The management API only ever returns this
    # literal placeholder — the secret is never committed or echoed back.
    - name: AZURE_SEARCH_API_KEY
      value: ${{connections.kb-search-key.credentials.AZURE_SEARCH_API_KEY}}
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
