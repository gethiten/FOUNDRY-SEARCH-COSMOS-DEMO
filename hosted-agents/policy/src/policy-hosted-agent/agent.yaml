# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: policy-hosted-agent
description: |
    Hosted agent that answers policy / claim / customer data questions by
    calling the insurance backend REST API.
metadata:
    tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Streaming
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini
    - name: POLICY_API_BASE_URL
      value: https://insrag-api-2b6rzj52ryljs.azurewebsites.net
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
