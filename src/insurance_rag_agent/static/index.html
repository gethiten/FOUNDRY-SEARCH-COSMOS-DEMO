<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Insurance Assistant</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273449;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --user: #2563eb;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    header .badge {
      font-size: 12px; color: var(--muted);
      border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .msg { display: flex; gap: 12px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: grid; place-items: center; font-size: 14px; font-weight: 700;
    }
    .msg.user .avatar { background: var(--user); }
    .msg.bot .avatar { background: var(--accent-2); }
    .bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user .bubble { background: var(--user); border-color: var(--accent-2); }
    .bubble.typing { color: var(--muted); font-style: italic; }
    .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .examples button {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 6px 12px; font-size: 13px; cursor: pointer;
    }
    .examples button:hover { border-color: var(--accent); }
    footer {
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 16px;
    }
    .composer {
      max-width: 900px; margin: 0 auto;
      display: flex; gap: 8px;
    }
    textarea {
      flex: 1; resize: none; height: 48px;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 15px; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    button.send {
      background: var(--accent-2); color: #06283d; border: none;
      border-radius: 10px; padding: 0 20px; font-weight: 600; cursor: pointer;
    }
    button.send:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Insurance Assistant</h1>
    <span class="badge">orchestrated · KB + Policy agents</span>
  </header>

  <div id="chat">
    <div class="msg bot">
      <div class="avatar">AI</div>
      <div class="bubble">Hi! I'm your auto-insurance assistant. I can answer policy/claim/customer
        lookups and general insurance questions — I route each question to the right specialist agent.
        <div class="examples">
          <button>What is the status of policy POL-001?</button>
          <button>What is a deductible?</button>
          <button>Explain the deductible on POL-001 and what a deductible means.</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="Ask about a policy, claim, or insurance concept..."
        autofocus></textarea>
      <button class="send" id="send">Send</button>
    </div>
  </footer>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = "msg " + role;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "You" : "AI";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    async function ask(question) {
      addMessage("user", question);
      const bubble = addMessage("bot", "Thinking...");
      bubble.classList.add("typing");
      sendBtn.disabled = true;
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(res.status + ": " + err);
        }
        const data = await res.json();
        bubble.classList.remove("typing");
        bubble.textContent = data.answer || "(no answer)";
      } catch (e) {
        bubble.classList.remove("typing");
        bubble.textContent = "Error: " + e.message;
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    function submit() {
      const q = input.value.trim();
      if (!q) return;
      input.value = "";
      ask(q);
    }

    sendBtn.addEventListener("click", submit);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });
    chat.addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON" && e.target.closest(".examples")) {
        ask(e.target.textContent.trim());
      }
    });
  </script>
</body>
</html>
